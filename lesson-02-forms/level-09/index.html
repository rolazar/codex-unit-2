<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lesson 02 — Level 09</title>
  </head>
  <body>
    <h1>Level 09 — Basic Validation</h1>
    <form>
      <!-- TODO: Add required attributes and minlength/maxlength where appropriate -->
      <!-- TODO: If using a range input, include min and max -->
      <label> Username Here </label>
      <input
        id="username"
        name="username"
        type="text"
        required
        minlength="2"
        maxlength="12"
      />
      <label> Rating Here</label>
      <input
        id="rating"
        name="rating"
        type="number"
        required
        min="0"
        max="100"
      />
      <button type="submit">SUBMIT TO ME</button>
    </form>
  </body>
</html>
