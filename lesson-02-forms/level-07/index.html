<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Lesson 02 — Level 07</title>
  </head>
  <body>
    <h1>Ratings</h1>
    <form>
      <label>
        Good:
        <input type="radio" name="rating" />
      </label>

      <label
        >Bad:
        <input type="radio" name="rating" />
      </label>

      <br />
      <label for="Friday-show">Did you watch the show on Friday?</label>
      <input id="Friday-show" type="checkbox" /> (Check for YES. Uncheck for
      NO.)
      <br />
      <label for="Saturday-show">Did you watch the show on Saturday?</label>
      <input id="Saturday-show" type="checkbox" /> (Check for YES. Uncheck for
      NO.)
      <br />
      <button type="submit">Submit Rating</button>
    </form>
  </body>
</html>
