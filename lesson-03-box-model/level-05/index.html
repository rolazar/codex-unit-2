<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Level 05 — Inline vs Block Elements</title>
    <style>
      /* TODO: Change display types to see how width/height/padding behave */
      .demo-inline {
        display: inline;
        background: #fee;
        width: 200px;
        padding-left: 20px;
      }
      .demo-block {
        display: block;
        background: #eef;
        width: 300px;
      }
      .demo-inline {
        display: inline-block;
        width: 120px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Inline vs Block</h1>
      <span class="demo-inline">Inline element</span>
      <div class="demo-block">Block element</div>
      <!-- TODO: Try `display: inline-block` and observe padding/width behavior -->
    </main>
  </body>
</html>
