<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Level 02 — Visualize with HTML/CSS</title>
    <style>
      /* Minimal starter styles — students should add distinct colors/borders */
      .box {
        display: flex;
        margin: 2rem;
        width: 50px;
        height: 50px;
      }
      .layer-margin {
        color: red;
        border-style: solid;
        border-width: 2px;
      }
      .layer-border {
        color: green;
        border-style: dashed;
        border-width: 2px;
      }
      .layer-padding {
        color: orangered;
        border-style: dotted;
        border-width: 2px;
      }
      .layer-content {
        color: blue;
        border-style: double;
        border-width: 2px;
      }
      /* TODO: add styles for .layer-content, .layer-padding, .layer-border, .layer-margin */
    </style>
  </head>
  <body>
    <main>
      <h1>Visualize the Box Model</h1>
      <!-- TODO: Add the elements below and style them to show each layer clearly -->
      <div class="box" aria-label="box-model-demo">
        <div class="layer-margin">
          <!-- margin layer hint -->
          <div class="layer-border">
            <!-- border layer hint -->
            <div class="layer-padding">
              <!-- padding layer hint -->
              <div class="layer-content">Content</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
